<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>CEMIL.IN</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>CEMIL.IN</h1>
  <p>Cemilan favorit warga UM Banjarmasin 😄</p>
</header>

<div class="container">

  <div class="card">

    <img src="images/kebab.png">

    <h2>Kebab</h2>

    <p class="harga">
      Rp 13.000
    </p>

    <button onclick="tambahKeranjang('Kebab',13000)">
    <!--<button onclick="alert('Tombol aktif')">-->
      Tambah ke Keranjang
    </button>

  </div>

  <div class="card">

    <img src="images/mie chili oil.png">

    <h2>Mie Chili Oil</h2>

    <p class="harga">
      Rp 13.000
    </p>

    <button onclick="tambahKeranjang('Mie Chili Oil',13000)">
      Tambah ke Keranjang
    </button>

  </div>

</div>

<div class="keranjang">

  <h2>🛒 Keranjang</h2>

  <div id="list-keranjang">
    Belum ada pesanan
  </div>

  <h3 id="total">
    Total: Rp 0
  </h3>

  <button onclick="checkout()">
    Checkout
  </button>

</div>

<div id="popup-topping" class="popup">

  <div class="popup-content">

    <h2>Pilih Topping</h2>

      <div class="topping-item">
      
        <label class="checkbox-container">
      
          <input type="checkbox" id="telur">
      
          <span class="checkmark"></span>
      
          <span>
            Extra Telur
          </span>
      
        </label>
      
        <span class="harga-topping">
          +3000
        </span>
      
      </div>
      
      <div class="topping-item">
      
        <label class="checkbox-container">
      
          <input type="checkbox" id="keju">
      
          <span class="checkmark"></span>
      
          <span>
            Extra Keju
          </span>
      
        </label>
      
        <span class="harga-topping">
          +5000
        </span>
      
      </div>
      
      <div class="topping-item">
      
        <label class="checkbox-container">
      
          <input type="checkbox" id="pedas">
      
          <span class="checkmark"></span>
      
          <span>
            Saos Pedas
          </span>
      
        </label>
      
      </div>
      
      <div class="topping-item">
      
        <label class="checkbox-container">
      
          <input type="checkbox" id="manis">
      
          <span class="checkmark"></span>
      
          <span>
            Saos Manis
          </span>
      
        </label>
      
      </div>
    
    <br><br>

    <button onclick="simpanTopping()">
      Tambahkan
    </button>

    <button
    class="close"
    onclick="tutupPopupTopping()">
      Batal
    </button>

  </div>

</div>
  
<div id="popup" class="popup">

  <div class="popup-content">

    <h2>Form Pemesanan</h2>

    <input
    type="text"
    id="nama"
    placeholder="Nama Pemesan"
    >

    <select id="lokasi">
      <option value="">
        Pilih Lokasi Kampus
      </option>

      <option>
        Kampus 1 S. Parman
      </option>

      <option>
        Kampus 2 Pascasarjana
      </option>

      <option>
        Kampus 3 Handil Bakti
      </option>
    </select>

    <textarea
    id="catatan"
    placeholder="Catatan tambahan"
    ></textarea>

    <button onclick="kirimPesanan()">
      Kirim Pesanan
    </button>

    <button
    class="close"
    onclick="tutupPopup()"
    >
      Batal
    </button>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
