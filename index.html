<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>CEMIL.IN</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>CEMIL.IN</h1>
  <p>Cemilan favorit warga UM Banjarmasin 😄</p>
</header>

<div class="container">

  <div id="loading">
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
  </div>
  
  <div id="daftar-menu">
    
  </div>

</div>

<div class="keranjang">

  <h2>🛒 Keranjang</h2>

  <div id="list-keranjang">
    Belum ada pesanan
  </div>

  <h3 id="total">
    Total: Rp 0
  </h3>

  <button onclick="checkout()">
    Checkout
  </button>

</div>

<div id="popup-topping" class="popup">

  <div class="popup-content">

    <h2>Pilih Varian</h2>

    <div id="isi-varian"></div>

    <br>
    
    <button onclick="simpanTopping()">
      Tambahkan
    </button>

    <button
    class="close"
    onclick="tutupPopupTopping()">
      Batal
    </button>

  </div>

</div>
  
<div id="popup" class="popup">

  <div class="popup-content">

    <h2>Form Pemesanan</h2>

    <label>Nama Pemesan</label>
    <input
      type="text"
      id="nama"
      placeholder="Nama Lengkap"
    >
    
    <label>Nomor WhatsApp</label>
    <input
      type="tel"
      id="wa"
      placeholder="08xxxxxxxxxx"
    >
    
    <label>Lokasi Pengantaran</label>
    <select id="lokasi">
      <option value="">Pilih Lokasi</option>
      <option>Kampus 1 S. Parman</option>
      <option>Kampus 2 Pascasarjana</option>
      <option>Kampus 3 Handil Bakti</option>
    </select>
    
    <label>Catatan</label>
    <textarea id="catatan"></textarea>

    <button onclick="kirimPesanan()">
      Kirim Pesanan
    </button>

    <button
    class="close"
    onclick="tutupPopup()"
    >
      Batal
    </button>

  </div>

</div>

<script src="app.js"></script>

<div id="loading-checkout" class="loading-checkout">

  <div class="loading-box">

    <div class="spinner"></div>

    <p>Mengirim pesanan...</p>

  </div>

</div>

<div id="popup-invoice" class="popup">

  <div class="popup-content">

    <h2>Invoice Pesanan</h2>

    <div id="invoice-content"></div>

    <br>

    <button onclick="window.print()">
      Print Invoice
    </button>

    <button
    class="close"
    onclick="tutupInvoice()">
      Tutup
    </button>

  </div>

</div>
  
</body>
</html>
